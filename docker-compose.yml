services:
  # --- DATABASE ---
  db:
    image: mysql:8.0
    container_name: billing-db
    restart: always
    environment:
      MYSQL_DATABASE: billing_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # --- BACKEND (LARAVEL) ---
  backend:
    build:
      context: ./isp-billing-backend
      dockerfile: Dockerfile
    container_name: billing-backend
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ./isp-billing-backend:/var/www/html
    depends_on:
      - db
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: billing_db
      DB_USERNAME: root
      DB_PASSWORD: root

  # --- FRONTEND (REACT) ---
  frontend:
    image: node:20
    container_name: billing-frontend
    working_dir: /app
    volumes:
      - ./isp-billing-frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  db_data:
