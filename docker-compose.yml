services:
  # --- DATABASE ---
  db:
    image: mysql:8.0
    container_name: billing-db
    restart: always
    environment:
      MYSQL_DATABASE: "${DB_NAME:-billing_db}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:?error: DB_ROOT_PASSWORD must be set}"
      MYSQL_ROOT_HOST: "${DB_ROOT_HOST:-%}"
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # --- CACHE & RATE LIMITING ---
  redis:
    image: redis:alpine
    container_name: billing-redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password_123}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5

  # --- BACKEND (LARAVEL) ---
  backend:
    build:
      context: ./isp-billing-backend
      dockerfile: Dockerfile
    container_name: billing-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-8000}:80"
    volumes:
      - ./isp-billing-backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: "${DB_NAME:-billing_db}"
      DB_USERNAME: "${DB_USERNAME:?error: DB_USERNAME must be set}"
      DB_PASSWORD: "${DB_PASSWORD:?error: DB_PASSWORD must be set}"
      APP_ENV: "${APP_ENV:-production}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_KEY: "${APP_KEY}"
      HTTPS_ONLY: "${HTTPS_ONLY:-false}"
      BCRYPT_ROUNDS: "${BCRYPT_ROUNDS:-10}"
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password_123}
      REDIS_PORT: 6379

  # --- QUEUE WORKER ---
  queue-worker:
    build:
      context: ./isp-billing-backend
      dockerfile: Dockerfile
    container_name: billing-queue-worker
    restart: always
    command: php artisan queue:work
    volumes:
      - ./isp-billing-backend:/var/www/html
    depends_on:
      backend:
        condition: service_started
    environment:
      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: "${DB_NAME:-billing_db}"
      DB_USERNAME: "${DB_USERNAME:?error: DB_USERNAME must be set}"
      DB_PASSWORD: "${DB_PASSWORD:?error: DB_PASSWORD must be set}"
      APP_ENV: "${APP_ENV:-production}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_KEY: "${APP_KEY}"
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password_123}
      REDIS_PORT: 6379

  # --- FRONTEND (REACT) ---
  frontend:
    image: node:20
    container_name: billing-frontend
    working_dir: /app
    volumes:
      - ./isp-billing-frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

  # --- NGROK WEBHOOK TUNNEL ---
  ngrok:
    image: ngrok/ngrok:latest
    container_name: billing-ngrok
    restart: always
    environment:
      NGROK_AUTHTOKEN: "${NGROK_AUTHTOKEN}"
    command:
      - "http"
      - "backend:80"
      - "--domain=${NGROK_DOMAIN}"
    depends_on:
      - backend

volumes:
  db_data:
